# config/filters.yaml — the free, deterministic pre-filter (docs/02 §3).
#
# Purpose: cut weekly volume before any LLM sees it, protecting the founder's Pro
# subscription limits. Dropped items are marked (items.prefilter = 'drop:<rule>'),
# never deleted (auditable, re-scorable).
#
# Core hard-drops implemented in M1 Step 3; Tier B keyword matching is Step 4.

tier_a_journals:
  # Declared for Step 4 (Tier A always passes, never auto-noised). Not yet used by
  # the drop logic — items already arrive via the Tier A allowlist or a topic query
  # (config/sources.yaml), so the interim passed-set is legitimately pre-filtered.
  # NLM Title Abbreviations, mirroring config/sources.yaml journal_allowlist.
  - "N Engl J Med"
  - "JAMA"
  - "JAMA Surg"
  - "JAMA Intern Med"
  - "Lancet"
  - "BMJ"
  - "Anesthesiology"
  - "Br J Anaesth"
  - "Anesth Analg"
  - "Anaesthesia"
  - "Reg Anesth Pain Med"
  - "Eur J Anaesthesiol"
  - "J Clin Anesth"
  - "Pain"
  - "Anesthesiol Clin"
  - "Intensive Care Med"
  - "Crit Care Med"
  - "Circulation"
  - "J Am Coll Cardiol"

tier_b_keywords: []
  # Step 4: standing-question / topic keywords for gating Tier B (non-allowlist)
  # journals. The topic queries in config/sources.yaml already encode these at the
  # PubMed level; this list is for re-checking precision inside the pipeline.

hard_drops:
  # item_type values (from pipeline/normalize.py) to drop before triage. These are
  # non-content or comment types (docs/02 §3). The "unless linked to a flagged trial"
  # nuance for letters is a Step 4/M2 refinement.
  item_types:
    - erratum
    - retraction
    - letter
    - editorial
    - news
    - comment
  # NOT a drop rule — a triage DEMOTION signal (PRACTICE_PROFILE.md §6): retrospective
  # studies below this n are capped at FYI by the triage model, never silently dropped.
  retrospective_n_below: 30
